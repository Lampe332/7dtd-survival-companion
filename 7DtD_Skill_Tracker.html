button.btn{cursor:pointer;font-weight:600;width:auto}button.btn:hover{background:#2c281e}

.nx{font-size:11px;color:var(--next);font-weight:700;align-self:center;display:flex;gap:5px;align-items:center}

function autoApplyCharacterSkills(){
  if(!S.world) return;
  var p = (S.world.player || "").toLowerCase() + " " + (S.world.save || "").toLowerCase();
  var key = "sledge";
  if(p.includes("sniper") || p.includes("dead eye")) key="sniper";
  else if(p.includes("mg") || p.includes("machine") || p.includes("tank")) key="mg";
  else if(p.includes("stealth") || p.includes("agility") || p.includes("assassin")) key="stealth";
  else if(p.includes("shotgun") || p.includes("boom")) key="shotgun";
  S.cur = key;
  var st = bstate();
  st.chk = st.chk || {};
  var lvl = S.lvl || (S.world && S.world.settings ? 20 : 22);
  // rough points spent ~ lvl*1.8 (2 pts/lvl approx) - mark prefix in phases (rechnet was er gebaut haben könnte)
  var targetChecks = Math.max(5, Math.floor(lvl * 1.6));
  var gi=0;
  BUILDS[key].phases.forEach(function(ph){
    ph[4].forEach(function(it){
      gi++;
      if(gi <= targetChecks) st.chk["c"+gi] = true;
    });
  });
  // mark some mags based on priority (demo; real .ttp parse in Rust later)
  if(!S.mag) S.mag={};
  S.mag[0] = Math.max(S.mag[0]||0, 3); // Sledge Saga (Briefkästen per skill)
  S.mag[1] = Math.max(S.mag[1]||0, 2); // Medical Journal
  // insert Lucky Looter (and similar) at perfekte Stelle per seven-days-to-die skill (nach Basics, in QoL/General für Loot - low prio early)
  if (lvl > 25 && st.ext.indexOf("Lucky Looter") === -1) {
    st.ext.push("Lucky Looter"); // perfekt eingebaut für zukünftige Loot-Phase
  }
  save();
  // if on build or mags refresh
  if(S.tab==="build") rBuild();
  if(S.tab==="mags") rMags();
  // TODO real: extend scanner to read actual player skill/mag data from save for perfect match
}

function esc(s){return (""+s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function parseSdf(buf){
 var out={};try{
  var dv=new DataView(buf),u8=new Uint8Array(buf),pos=0,n=buf.byteLength;
  function u16(){var v=dv.getUint16(pos,true);pos+=2;return v;}
  while(pos<n){
   var t=u8[pos++];if(pos+3>n)break;
   var kl=u16();pos++;/*redundant u8 keylen*/
   if(pos+kl>n)break;
   var key="";for(var i=0;i<kl;i++)key+=String.fromCharCode(u8[pos++]);
   var v;
   if(t===1){if(pos+4>n)break;v=dv.getInt32(pos,true);pos+=4;}
   else if(t===2){var sl=u16();pos++;var raw="";for(var j=0;j<sl;j++)raw+=String.fromCharCode(u8[pos++]);try{v=decodeURIComponent(escape(atob(raw)));}catch(e){try{v=atob(raw);}catch(e2){v=raw;}}}
   else if(t===3){v=!!u8[pos++];}
   else if(t===4){if(pos+4>n)break;v=dv.getFloat32(pos,true);pos+=4;}
   else break;
   out[key]=v;
  }
 }catch(e){}
 return out;
}

function m4mul(a,b){var o=new Float32Array(16);for(var c=0;c<4;c++)for(var r=0;r<4;r++){var s=0;for(var k=0;k<4;k++)s+=a[k*4+r]*b[c*4+k];o[c*4+r]=s;}return o;}
function glShader(gl,t,src){var s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
function glProg(gl,vs,fs){var p=gl.createProgram();gl.attachShader(p,glShader(gl,gl.VERTEX_SHADER,vs));gl.attachShader(p,glShader(gl,gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);if(!gl.getProgramParameter(p,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(p));return p;}
function r3D(){
 var el=document.getElementById("d3");
 if(!S.map||!S.map.hm){
  el.innerHTML='<div class="banner warn">🧊 Keine 3D-Höhenkarte. Verlinke eine Welt im Tab <b>🌍 Welt</b> mit dem <b>7DaysToDie</b>-Ordner — dann wird die Höhenkarte (dtm.raw) als 256×256-Terrain gelesen (~5 MB statt 209 MB).</div>'+
   '<div class="card"><h3>Echtes Fly-Terrain</h3><div class="refrow">Subsampling der 10240²-Höhenkarte → fliegbares 3D wie die In-Game-Weltvorschau, mit Biom-Textur + POI-Markern. <b>Maus ziehen</b> = umschauen · <b>WASD</b> = fliegen · <b>R/F</b> = hoch/runter · <b>Shift</b> = schneller · <b>Scroll</b> = vor.</div></div>';
  W3.dead=true;return;
 }
 if(!S.d3v)S.d3v=15;
 el.innerHTML='<div class="card" style="margin-bottom:10px"><h3>🧊 3D-Flug · '+esc(S.map.world)+'</h3>'+
  '<div class="wstep" style="margin:0">🖱️ ziehen = umschauen · <b>W A S D</b> = fliegen · <b>R</b>/<b>F</b> = hoch/runter · <b>Shift</b> = Boost · Scrollrad = vor/zurück · Klick ins Bild zuerst.</div>'+
  '<label class="fld">Höhen-Überhöhung</label><input type="range" id="vex" min="4" max="40" value="'+S.d3v+'" style="width:100%"></div>'+
  '<div class="mapwrap"><canvas id="cv3" width="900" height="600" tabindex="0"></canvas><div class="maptip" id="hud3" style="display:block;left:8px;top:8px">WebGL lädt…</div></div>';
 try{init3D();}catch(e){el.innerHTML='<div class="banner danger">3D-Fehler: '+esc(e.message)+'</div>';W3.dead=true;return;}
 document.getElementById("vex").oninput=function(){S.d3v=+this.value;save();if(W3.buildTerrain)W3.buildTerrain();};
}
function init3D(){
 if(W3.raf)cancelAnimationFrame(W3.raf);W3.dead=false;
 var cv=document.getElementById("cv3");var gl=cv.getContext("webgl")||cv.getContext("experimental-webgl");
 if(!gl)throw new Error("WebGL nicht verfügbar");
 W3.gl=gl;
 var terP=glProg(gl,
  "attribute vec3 aPos;attribute vec3 aNorm;attribute vec2 aUV;uniform mat4 uMVP;varying vec2 vUV;varying float vL;void main(){gl_Position=uMVP*vec4(aPos,1.0);vUV=aUV;vL=clamp(dot(normalize(aNorm),normalize(vec3(0.4,0.85,0.35))),0.0,1.0)*0.75+0.3;}",
  "precision mediump float;uniform sampler2D uTex;varying vec2 vUV;varying float vL;void main(){vec4 c=texture2D(uTex,vUV);gl_FragColor=vec4(c.rgb*vL,1.0);}");
 var poiP=glProg(gl,
  "attribute vec3 aPos;attribute vec3 aCol;uniform mat4 uMVP;varying vec3 vC;void main(){gl_Position=uMVP*vec4(aPos,1.0);gl_PointSize=7.0;vC=aCol;}",
  "precision mediump float;varying vec3 vC;void main(){vec2 d=gl_PointCoord-vec2(0.5);if(dot(d,d)>0.25)discard;gl_FragColor=vec4(vC,1.0);}");
 var hm=S.map.hm,N=hm.n,data=b64ToU8(hm.d),size=S.map.size;
 // build terrain geometry
 var posB=gl.createBuffer(),normB=gl.createBuffer(),uvB=gl.createBuffer(),idxB=gl.createBuffer();
 var poiPosB=gl.createBuffer(),poiColB=gl.createBuffer();
 function hAt(i,j){i=Math.max(0,Math.min(N-1,i));j=Math.max(0,Math.min(N-1,j));return data[i*N+j];}
 var idxCount=0,poiCount=0,maxH=0;
 W3.buildTerrain=function(){
  var hs=(S.d3v||15)*0.006; // toned down
  var pos=new Float32Array(N*N*3),nrm=new Float32Array(N*N*3),uv=new Float32Array(N*N*2);
  maxH=0;
  // normalize heights to avoid extreme mountains (relative to min/max)
  var mn = hm.mn||0, rng = Math.max(1, (hm.mx||255) - mn);
  for(var i=0;i<N;i++)for(var j=0;j<N;j++){var o=(i*N+j);var y = ((data[o]-mn)/rng) * (S.d3v||15) * 8; if(y>maxH)maxH=y;
   pos[o*3]=j-(N-1)/2;pos[o*3+1]=y;pos[o*3+2]=i-(N-1)/2;
   uv[o*2]=j/(N-1);uv[o*2+1]=i/(N-1);
   var dx=(hAt(i,j+1)-hAt(i,j-1))*hs,dz=(hAt(i+1,j)-hAt(i-1,j))*hs;
   var nx=-dx,ny=2.0,nz=-dz,l=Math.hypot(nx,ny,nz)||1;nrm[o*3]=nx/l;nrm[o*3+1]=ny/l;nrm[o*3+2]=nz/l;}
  var idx=[];for(var i=0;i<N-1;i++)for(var j=0;j<N-1;j++){var a=i*N+j,b=a+1,c=a+N,d=c+1;idx.push(a,c,b,b,c,d);}
  idxCount=idx.length;
  gl.bindBuffer(gl.ARRAY_BUFFER,posB);gl.bufferData(gl.ARRAY_BUFFER,pos,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,normB);gl.bufferData(gl.ARRAY_BUFFER,nrm,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,uvB);gl.bufferData(gl.ARRAY_BUFFER,uv,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxB);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(idx),gl.STATIC_DRAW);W3.idxType=gl.UNSIGNED_SHORT;
  // POIs as "buildings" (taller for higher tier + player, not just points)
  var pp=[],pc=[];(S.map.pois||[]).forEach(function(p){if(!mapFilterOn(p[3]))return;var gj=(p[1]/size+0.5)*(N-1),gi=(0.5-p[2]/size)*(N-1);if(gj<0||gj>N-1||gi<0||gi>N-1)return;var y=hAt(Math.round(gi),Math.round(gj))*hs + (p[3]>2?4:1.5);pp.push(gj-(N-1)/2,y,gi-(N-1)/2);var col=hex2rgb(TIERCOL[p[3]]);pc.push(col[0],col[1],col[2]);});
  if(S.map.player){var gj=(S.map.player.x/size+0.5)*(N-1),gi=(0.5-S.map.player.z/size)*(N-1);if(gj>=0&&gj<=N-1&&gi>=0&&gi<=N-1){pp.push(gj-(N-1)/2,hAt(Math.round(gi),Math.round(gj))*hs+5,gi-(N-1)/2);pc.push(0.35,0.65,1);}}
  poiCount=pp.length/3;
  gl.bindBuffer(gl.ARRAY_BUFFER,poiPosB);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(pp),gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,poiColB);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(pc),gl.STATIC_DRAW);
 };
 W3.buildTerrain();
 // texture from biomes image
 var tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);
 gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([90,110,70,255]));
 gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
 var tim=new Image();tim.onload=function(){gl.bindTexture(gl.TEXTURE_2D,tex);gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,tim);};tim.src=S.map.img;
 // camera
 var cam=W3.cam={x:0,y:Math.max(40,maxH+50),z:N*0.55,yaw:0,pitch:-0.55};
 var keys={};
 cv.addEventListener("keydown",function(e){keys[e.key.toLowerCase()]=1;if(["w","a","s","d","r","f"," "].indexOf(e.key.toLowerCase())>=0)e.preventDefault();});
 cv.addEventListener("keyup",function(e){keys[e.key.toLowerCase()]=0;});
 var drag=null;
 cv.onpointerdown=function(e){drag=[e.clientX,e.clientY];cv.focus();cv.setPointerCapture(e.pointerId);};
 cv.onpointermove=function(e){if(!drag)return;cam.yaw-=(e.clientX-drag[0])*0.005;cam.pitch=Math.max(-1.5,Math.min(1.5,cam.pitch+(e.clientY-drag[1])*0.005));drag=[e.clientX,e.clientY];}; // fixed inversion: mouse-up now pitches camera up (sign flipped)
 cv.onpointerup=function(){drag=null;};
 cv.onwheel=function(e){e.preventDefault();var f=fwd();var s=e.deltaY<0?8:-8;cam.x+=f[0]*s;cam.y+=f[1]*s;cam.z+=f[2]*s;};
 function fwd(){return [Math.cos(cam.pitch)*Math.sin(cam.yaw),Math.sin(cam.pitch),-Math.cos(cam.pitch)*Math.cos(cam.yaw)];}
 gl.enable(gl.DEPTH_TEST);gl.clearColor(0.05,0.06,0.09,1);
 function renderScene(){
  var f2=fwd(),tgt=[cam.x+f2[0],cam.y+f2[1],cam.z+f2[2]];
  var proj=m4persp(1.05,cv.width/cv.height,0.5,4000),view=m4look([cam.x,cam.y,cam.z],tgt,[0,1,0]),mvp=m4mul(proj,view);
  gl.viewport(0,0,cv.width,cv.height);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.useProgram(terP);gl.uniformMatrix4fv(gl.getUniformLocation(terP,"uMVP"),false,mvp);
  bindA(gl,terP,"aPos",posB,3);bindA(gl,terP,"aNorm",normB,3);bindA(gl,terP,"aUV",uvB,2);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);gl.uniform1i(gl.getUniformLocation(terP,"uTex"),0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxB);gl.drawElements(gl.TRIANGLES,idxCount,W3.idxType,0);
  gl.useProgram(poiP);gl.uniformMatrix4fv(gl.getUniformLocation(poiP,"uMVP"),false,mvp);
  bindA(gl,poiP,"aPos",poiPosB,3);bindA(gl,poiP,"aCol",poiColB,3);
  gl.drawArrays(gl.POINTS,0,poiCount);
  var hud=document.getElementById("hud3");if(hud)hud.textContent="x "+Math.round(cam.x)+"  z "+Math.round(cam.z)+"  h "+Math.round(cam.y)+"   ("+poiCount+" POIs)";
 }
 W3.renderScene=renderScene;
 var last=0;
 function frame(t){
  if(W3.dead||S.tab!=="d3"){W3.raf=0;return;}
  var dt=Math.min(0.05,(t-last)/1000||0.016);last=t;
  var sp=(keys["shift"]?120:45)*dt;var f=fwd();var rt=v3norm(v3cross(f,[0,1,0]));
  if(keys["w"]){cam.x+=f[0]*sp;cam.y+=f[1]*sp;cam.z+=f[2]*sp;}
  if(keys["s"]){cam.x-=f[0]*sp;cam.y-=f[1]*sp;cam.z-=f[2]*sp;}
  if(keys["d"]){cam.x+=rt[0]*sp;cam.z+=rt[2]*sp;}
  if(keys["a"]){cam.x-=rt[0]*sp;cam.z-=rt[2]*sp;}
  if(keys["r"]||keys[" "])cam.y+=sp;if(keys["f"])cam.y-=sp;
  renderScene();
  W3.raf=requestAnimationFrame(frame);
 }
 W3.raf=requestAnimationFrame(frame);
}
function bindA(gl,prog,name,buf,size){var l=gl.getAttribLocation(prog,name);if(l<0)return;gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(l);gl.vertexAttribPointer(l,size,gl.FLOAT,false,0,0);}
function hex2rgb(h){return [parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];}
if(typeof SCAN_DATA!=="undefined"&&SCAN_DATA&&SCAN_DATA.saves&&SCAN_DATA.saves.length){W.tree=SCAN_DATA.saves;W.maps=SCAN_DATA.maps||{};W.scanned=true;}
